<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام جدولة المناوبات الذكي - ألوان متناسقة</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #fff; }
        
        .setup-area { 
            background: #f8f9fa; 
            padding: 20px; 
            border: 1px solid #ddd; 
            margin-bottom: 25px; 
            border-radius: 8px; 
            text-align: center; 
        }

        table { width: 100%; border-collapse: collapse; border: 2.5px solid black; table-layout: fixed; }
        td, th { border: 1.5px solid black; padding: 8px; text-align: center; vertical-align: middle; font-weight: bold; overflow: hidden; }
        
        /* جعل الاسم والعنوان يظهران بدون خلفيات منفصلة ليتخذا لون الصف */
        .ph-name, .ph-loc { background-color: transparent !important; }
        .ph-name { width: 150px; font-size: 15px; color: #000; }
        .ph-loc { font-size: 12px; font-weight:800; color: #333; }

        /* تعديل خلايا اليوم والتاريخ لتظل بيضاء دائماً */
        .day-cell, .date-cell { width: 45px; background-color: #fff !important; }

        [contenteditable="true"]:hover { background-color: rgba(255,255,255,0.5); cursor: edit; }
        [contenteditable="true"]:focus { outline: 2px solid #2c3e50; background: #fff; }

        .vertical-text { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            white-space: nowrap; 
            font-size: 16px;
        }

        /* ألوان الأيام الموحدة */
        .day-sat { background-color: #e3f2fd !important; }
        .day-sun { background-color: #fce4ec !important; }
        .day-mon { background-color: #f1f8e9 !important; }
        .day-tue { background-color: #ede7f6 !important; }
        .day-wed { background-color: #e0f2f1 !important; }
        .day-thu { background-color: #fff3e0 !important; }
        .day-fri { background-color: #fff9c4 !important; }

        .actions { text-align: center; margin-top: 20px; }
        button { 
            background: #2c3e50; color: #fff; padding: 10px 25px; 
            border: none; cursor: pointer; font-size: 16px; border-radius: 5px; margin: 5px; 
        }
        .btn-excel { background: #27ae60; }
        .edit-hint { color: #e67e22; font-size: 14px; margin-bottom: 10px; display: block; text-align: center; }

        @media print { .setup-area, .actions, .edit-hint { display: none; } body { margin: 0; } }
    </style>
</head>
<body>

    <div class="setup-area">
        <label>من تاريخ:</label> <input type="date" id="startInput">
        <label>إلى تاريخ:</label> <input type="date" id="endInput">
        <label>ابدأ بالمجموعة:</label> <input type="number" id="startGroup" value="1" min="1" style="width: 60px;">
        <button onclick="buildTable()">توليد الجدول</button>
    </div>

    <span class="edit-hint">* يمكنك الضغط على أي اسم أو عنوان لتعديله يدوياً.</span>

    <table id="scheduleTable">
        <tbody></tbody>
    </table>

    <div class="actions">
        <button class="btn-excel" onclick="exportToExcel()">تحميل كملف Excel</button>
        <button onclick="window.print()">طباعة الجدول / PDF</button>
    </div>

    <script>
        const dayClasses = ["day-sun", "day-mon", "day-tue", "day-wed", "day-thu", "day-fri", "day-sat"];

        async function buildTable() {
            try {
                const res = await fetch('pharmacies.json');
                const groups = await res.json();
                
                const startVal = document.getElementById('startInput').value;
                const endVal = document.getElementById('endInput').value;
                const startGroupNum = parseInt(document.getElementById('startGroup').value) - 1; 

                const tbody = document.querySelector('#scheduleTable tbody');
                if (!startVal || !endVal) return alert("يرجى اختيار التواريخ");

                let current = new Date(startVal);
                const endLimit = new Date(endVal);
                tbody.innerHTML = "";
                
                let groupCounter = startGroupNum;

                while (current <= endLimit) {
                    const dayIndex = current.getDay();
                    const dayName = current.toLocaleDateString('ar-EG', {weekday: 'long'});
                    const d = current.getDate().toString().padStart(2, '0');
                    const m = (current.getMonth()+1).toString().padStart(2, '0');
                    const y = current.getFullYear();
                    const dateStr = `${y}/${m}/${d}`; 
                    
                    const rowClass = dayClasses[dayIndex];

                    if (dayIndex === 5) {
                        const gR = groups[groupCounter % groups.length]; groupCounter++;
                        const gL = groups[groupCounter % groups.length]; groupCounter++;
                        renderRows(tbody, gR, gL, dayName, dateStr, 6, rowClass, true);
                    } else {
                        renderRows(tbody, groups[groupCounter % groups.length], null, dayName, dateStr, 3, rowClass, false);
                        groupCounter++;
                    }
                    current.setDate(current.getDate() + 1);
                }
            } catch (e) {
                alert("خطأ: " + e.message);
            }
        }

        function renderRows(tbody, g1, g2, day, dateStr, rowSpan, rowClass, isFriday) {
            const phar1 = g1.pharmacies || [];
            const phar2 = g2 ? g2.pharmacies : [];

            for (let i = 0; i < rowSpan; i++) {
                const row = tbody.insertRow();
                row.classList.add(rowClass); // تطبيق لون اليوم على كامل الصف

                if (i === 0) {
                    const cDay = row.insertCell(); cDay.rowSpan = rowSpan; cDay.className = "day-cell";
                    cDay.innerHTML = `<div class="vertical-text">${day}</div>`;
                    const cDate = row.insertCell(); cDate.rowSpan = rowSpan; cDate.className = "date-cell";
                    cDate.innerHTML = `<div class="vertical-text">${dateStr}</div>`;
                }

                if (isFriday) {
                    // توزيع الجمعة (الاسم ثم العنوان للمجموعة اليسرى ثم الاسم والعنوان لليمنى)
                    addEditableCell(row, phar2[i], "name");
                    addEditableCell(row, phar2[i], "loc");
                    addEditableCell(row, phar1[i], "name");
                    addEditableCell(row, phar1[i], "loc");
                } else {
                    // توزيع الأيام العادية
                    addEditableCell(row, phar1[i * 2 + 1], "name");
                    addEditableCell(row, phar1[i * 2 + 1], "loc");
                    addEditableCell(row, phar1[i * 2], "name");
                    addEditableCell(row, phar1[i * 2], "loc");
                }
            }
        }

        function addEditableCell(row, phar, type) {
            const cell = row.insertCell();
            cell.className = type === "name" ? "ph-name" : "ph-loc";
            cell.innerText = phar ? phar[type] : "---";
            cell.contentEditable = "true";
        }

        function exportToExcel() {
            const table = document.getElementById("scheduleTable");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "جدول_المناوبات.xlsx");
        }
    </script>
</body>
</html>
